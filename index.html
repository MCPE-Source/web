<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>MCPE-Source | Minecraft PE Alpha content</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        code {
            background-color: #333 !important;
            color: #dcdcdc !important;
        }
    
        .content-box {
            position: relative;
            overflow: hidden;
            border: 2px solid #555;
            border-radius: 4px;
            padding: 40px 20px;
            text-align: center;
            text-decoration: none !important;
            transition: border-color 0.2s ease-in-out;
            display: block;
            background-color: #1b1b1b;
            z-index: 1;
        }

        .content-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-size: cover;
            background-position: center;
            filter: blur(3px) brightness(0.5);
            z-index: -1;
            transition: filter 0.3s ease-in-out;
        }

        #maps-box::before {
            background-image: url('assets/images/nav_maps.png');
        }
        #mods-box::before {
            background-image: url('assets/images/nav_mods.png');
        }
        #textures-box::before {
            background-image: url('assets/images/nav_textures.jpg');
        }
        #plugins-box::before {
            background-image: url('assets/images/nav_plugins.png');
        }

        .content-box:hover,
        .content-box:focus {
            border-color: #999;
            outline: none;
        }

        .content-box:hover::before {
            filter: blur(2px) brightness(0.7);
        }

        .content-box h3 {
            color: #ffffff !important;
            margin: 0;
            font-size: 30px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }
    </style>
</head>
